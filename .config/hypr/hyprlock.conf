$wallpaper = $HOME/.config/hypr/hyprlock-wallpaper.jpg
$avatar = $HOME/.config/hypr/hyprlock-avatar.jpg
$card = rgba(18, 18, 30, 0.45)
$surface = rgba(255, 255, 255, 0.10)
$text = rgba(230, 235, 255, 0.92)
$muted = rgba(230, 235, 255, 0.78)
$accent = rgba(255, 72, 135, 0.90)

general {
    ignore_empty_input = true
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

background {
    monitor =
    path = $wallpaper
    blur_passes = 0
    contrast = 1.0
    brightness = 0.88
    vibrancy = 0.12
    vibrancy_darkness = 0.0
}

animations {
    enabled = false
}

shape {
    monitor =
    size = 540, 690
    color = $card
    rounding = 36
    border_size = 2
    border_color = rgba(255, 255, 255, 0.12)
    position = 0, 12
    halign = center
    valign = center
}

image {
    monitor =
    path = $avatar
    border_size = 3
    border_color = $accent
    size = 140
    rounding = -1
    position = 0, 258
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = $muted
    font_size = 26
    font_family = JetBrainsMono Nerd Font
    position = 0, 156
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = $text
    font_size = 78
    font_family = JetBrainsMono Nerd Font
    position = 0, 52
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +\"%A, %d de %B\")"
    color = $muted
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, -12
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 360, 56
    outline_thickness = 0
    dots_size = 0.22
    dots_spacing = 0.18
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.0)
    inner_color = $surface
    font_color = rgb(230, 235, 255)
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font
    placeholder_text = <i><span foreground="##e6ebffcc">  Enter Password</span></i>
    hide_input = false
    check_color = rgba(255, 72, 135, 0.90)
    fail_color = rgba(255, 120, 120, 0.90)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    position = 0, -202
    halign = center
    valign = center
}

auth {
    fingerprint:enabled = true
}
